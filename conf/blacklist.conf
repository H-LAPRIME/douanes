# =============================================================
# blacklist.conf — Commandes interdites aux utilisateurs standard
# Format : pattern (partiel ou complet) par ligne
# Toute commande contenant ce pattern sera bloquée
# =============================================================

# Suppression destructrice
rm -rf /
rm -rf /*
rm --no-preserve-root

# Écrasement de disque
dd if=/dev/zero
dd if=/dev/random of=/dev/sd
mkfs

# Arrêt système
shutdown
reboot
halt
poweroff
init 0
init 6

# Permissions dangereuses
chmod 777 /
chmod -R 777 /
chown -R root /

# Fork bomb
:(){:|:&};:
:(){ :|: & };:

# Exécution réseau non vérifiée
curl.*bash
curl.*sh
wget.*sh
wget.*bash

# Accès root direct
sudo su
sudo -i
sudo bash
sudo sh

# Modification du système
passwd root
userdel root
groupdel root
